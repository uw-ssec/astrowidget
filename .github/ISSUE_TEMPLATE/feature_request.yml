name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're
        trying to solve -- this helps us understand the motivation and design the
        right solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What workflow is difficult or impossible today?
      placeholder: "When I try to visualize X, I have to manually do Y, which is error-prone because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered or workarounds you're currently using.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of astrowidget is this related to?
      options:
        - SkyWidget (core widget)
        - SkyViewer (dashboard)
        - Data loading (open_dataset, PreloadedCube)
        - WebGL renderer
        - HiPS backgrounds
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context -- mockups, references to similar tools, related issues, etc.
    validations:
      required: false
